<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860" role="img" aria-labelledby="title desc">
  <title id="title">光伏发电单元通信与并网系统图</title>
  <desc id="desc">包含两路组件方阵、汇流箱、直流配电柜、光伏逆变器、双分裂升压变压器、测控装置、保护装置、光伏发电单元规约转换器、光纤通信设备和图像监视的系统架构图。</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrowSoft" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>

    <style>
      .font { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif; }
      .group {
        fill: none;
        stroke: #94a3b8;
        stroke-width: 1.6;
        stroke-dasharray: 8 7;
      }
      .title {
        font-size: 22px;
        font-weight: 700;
        fill: #334155;
      }
      .node {
        rx: 8;
        ry: 8;
        stroke-width: 1.5;
        filter: url(#shadow);
      }
      .node-title {
        font-size: 18px;
        font-weight: 700;
        fill: #1f2937;
      }
      .node-sub {
        font-size: 12px;
        fill: #64748b;
      }
      .small {
        font-size: 15px;
        font-weight: 600;
        fill: #334155;
      }
      .mono {
        font-family: Consolas, "SFMono-Regular", monospace;
      }

      .flow {
        fill: none;
        stroke: #334155;
        stroke-width: 2.1;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .flow-no-arrow {
        fill: none;
        stroke: #334155;
        stroke-width: 2.1;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .signal {
        fill: none;
        stroke: #64748b;
        stroke-width: 1.6;
        stroke-dasharray: 3 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .signal-arrow {
        fill: none;
        stroke: #64748b;
        stroke-width: 1.6;
        stroke-dasharray: 3 5;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrowSoft);
      }

      .solar { fill: #edf6ff; stroke: #5b88a4; stroke-width: 1.4; }
      .asset-blue { fill: #f2f8fc; stroke: #6188a3; }
      .asset-green { fill: #f3faf6; stroke: #658f7f; }
      .asset-amber { fill: #fffaf1; stroke: #ae8a58; }
      .asset-violet { fill: #f6f4fb; stroke: #8a78ad; }
      .asset-slate { fill: #f8fafc; stroke: #6b7280; }

      .device-line {
        stroke: #475569;
        stroke-width: 1.6;
        fill: none;
      }
    </style>
  </defs>

  <!-- ===== 上方：组件方阵 ① ===== -->
  <g class="font">
    <text class="title" x="88" y="48">组件方阵</text>
    <rect class="group" x="28" y="62" width="318" height="246" rx="10"/>

    <!-- 组件串 -->
    <g>
      <rect class="solar" x="48" y="88" width="52" height="28" rx="3"/>
      <path class="device-line" d="M55 95 L92 102 L55 109 Z"/>

      <rect class="solar" x="132" y="88" width="52" height="28" rx="3"/>
      <path class="device-line" d="M139 95 L176 102 L139 109 Z"/>

      <rect class="solar" x="216" y="88" width="52" height="28" rx="3"/>
      <path class="device-line" d="M223 95 L260 102 L223 109 Z"/>

      <path class="flow" d="M100 102 H132"/>
      <path class="flow" d="M184 102 H216"/>
      <path class="flow" d="M268 102 H316"/>
    </g>

    <rect class="node asset-green" x="54" y="148" width="220" height="50"/>
    <title>太阳跟踪系统：用于调整组件姿态，提高发电效率。</title>
    <text class="node-title" x="164" y="180" text-anchor="middle">太阳跟踪系统</text>

    <rect class="node asset-blue" x="54" y="222" width="220" height="50"/>
    <title>通信控制单元：采集组件方阵状态并进行控制通信。</title>
    <text class="node-title" x="164" y="254" text-anchor="middle">通信控制单元</text>
  </g>

  <!-- 上方：汇流箱 -->
  <g class="font">
    <rect class="group" x="372" y="62" width="206" height="172" rx="10"/>

    <rect class="node asset-amber" x="396" y="88" width="158" height="50"/>
    <title>汇流箱：汇聚多路组串电流，并完成支路保护与监测。</title>
    <text class="node-title" x="475" y="120" text-anchor="middle">汇流箱</text>

    <rect class="node asset-blue" x="396" y="170" width="158" height="50"/>
    <title>通信控制单元：汇流箱的通信与状态采集。</title>
    <text class="node-title" x="475" y="202" text-anchor="middle">通信控制单元</text>
  </g>

  <!-- 上方：直流配电柜 -->
  <g class="font">
    <rect class="node asset-amber" x="598" y="88" width="168" height="50"/>
    <title>直流配电柜：实现直流电汇集、隔离、保护和送电。</title>
    <text class="node-title" x="682" y="120" text-anchor="middle">直流配电柜</text>
  </g>

  <!-- 上方：逆变器 -->
  <g class="font">
    <rect class="group" x="792" y="22" width="240" height="212" rx="10"/>
    <text class="title" x="912" y="54" text-anchor="middle">光伏逆变器</text>

    <rect class="node asset-violet" x="826" y="78" width="172" height="66"/>
    <title>光伏逆变器：将直流电变换为满足并网要求的交流电。</title>
    <path class="device-line" d="M846 123 L884 97 H970"/>
    <path class="device-line" d="M914 97 C926 97 926 126 938 126 C950 126 950 97 962 97"/>
    <text class="node-sub" x="912" y="138" text-anchor="middle">DC / AC 变换</text>

    <rect class="node asset-blue" x="826" y="168" width="172" height="50"/>
    <title>通信控制单元：逆变器的通信与控制接口。</title>
    <text class="node-title" x="912" y="200" text-anchor="middle">通信控制单元</text>
  </g>

  <!-- ===== 下方：组件方阵 ② ===== -->
  <g class="font">
    <rect class="group" x="28" y="356" width="318" height="246" rx="10"/>

    <!-- 组件串 -->
    <g>
      <rect class="solar" x="48" y="382" width="52" height="28" rx="3"/>
      <path class="device-line" d="M55 389 L92 396 L55 403 Z"/>

      <rect class="solar" x="132" y="382" width="52" height="28" rx="3"/>
      <path class="device-line" d="M139 389 L176 396 L139 403 Z"/>

      <rect class="solar" x="216" y="382" width="52" height="28" rx="3"/>
      <path class="device-line" d="M223 389 L260 396 L223 403 Z"/>

      <path class="flow" d="M100 396 H132"/>
      <path class="flow" d="M184 396 H216"/>
      <path class="flow" d="M268 396 H316"/>
    </g>

    <rect class="node asset-green" x="54" y="442" width="220" height="50"/>
    <title>太阳跟踪系统：用于调整组件姿态，提高发电效率。</title>
    <text class="node-title" x="164" y="474" text-anchor="middle">太阳跟踪系统</text>

    <rect class="node asset-blue" x="54" y="516" width="220" height="50"/>
    <title>通信控制单元：采集组件方阵状态并进行控制通信。</title>
    <text class="node-title" x="164" y="548" text-anchor="middle">通信控制单元</text>
  </g>

  <!-- 下方：汇流箱 -->
  <g class="font">
    <rect class="group" x="372" y="356" width="206" height="172" rx="10"/>

    <rect class="node asset-amber" x="396" y="382" width="158" height="50"/>
    <title>汇流箱：汇聚多路组串电流，并完成支路保护与监测。</title>
    <text class="node-title" x="475" y="414" text-anchor="middle">汇流箱</text>

    <rect class="node asset-blue" x="396" y="464" width="158" height="50"/>
    <title>通信控制单元：汇流箱的通信与状态采集。</title>
    <text class="node-title" x="475" y="496" text-anchor="middle">通信控制单元</text>
  </g>

  <!-- 下方：直流配电柜 -->
  <g class="font">
    <rect class="node asset-amber" x="598" y="382" width="168" height="50"/>
    <title>直流配电柜：实现直流电汇集、隔离、保护和送电。</title>
    <text class="node-title" x="682" y="414" text-anchor="middle">直流配电柜</text>
  </g>

  <!-- 下方：逆变器 -->
  <g class="font">
    <rect class="group" x="792" y="316" width="240" height="212" rx="10"/>

    <rect class="node asset-violet" x="826" y="372" width="172" height="66"/>
    <title>光伏逆变器：将直流电变换为满足并网要求的交流电。</title>
    <path class="device-line" d="M846 417 L884 391 H970"/>
    <path class="device-line" d="M914 391 C926 391 926 420 938 420 C950 420 950 391 962 391"/>
    <text class="node-sub" x="912" y="432" text-anchor="middle">DC / AC 变换</text>

    <rect class="node asset-blue" x="826" y="462" width="172" height="50"/>
    <title>通信控制单元：逆变器的通信与控制接口。</title>
    <text class="node-title" x="912" y="494" text-anchor="middle">通信控制单元</text>
  </g>

  <!-- ===== 主电能路径 ===== -->
  <path class="flow" d="M346 102 H396"/>
  <path class="flow" d="M554 113 H598"/>
  <path class="flow" d="M766 113 H826"/>
  <path class="flow" d="M998 111 H1044 L1132 190"/>

  <path class="flow" d="M346 396 H396"/>
  <path class="flow" d="M554 407 H598"/>
  <path class="flow" d="M766 407 H826"/>
  <path class="flow" d="M998 405 H1060 L1132 286"/>

  <!-- ===== 双分裂升压变压器 ===== -->
  <g class="font">
    <text class="title" x="1278" y="74" text-anchor="middle">双分裂升压</text>
    <text class="title" x="1278" y="102" text-anchor="middle">变压器</text>

    <g transform="translate(1142 148)">
      <circle cx="70" cy="56" r="44" fill="#fbfdff" stroke="#516779" stroke-width="2"/>
      <circle cx="116" cy="56" r="44" fill="#fbfdff" stroke="#516779" stroke-width="2"/>
      <circle cx="93" cy="92" r="44" fill="#fbfdff" stroke="#516779" stroke-width="2"/>
    </g>

    <path class="flow" d="M1302 204 H1386"/>
  </g>

  <!-- ===== 测控、保护 ===== -->
  <g class="font">
    <rect class="node asset-green" x="1318" y="230" width="156" height="50"/>
    <title>测控装置：采集电压、电流、功率及状态量。</title>
    <text class="node-title" x="1396" y="262" text-anchor="middle">测控装置</text>

    <rect class="node asset-amber" x="1284" y="304" width="156" height="50"/>
    <title>保护装置：执行故障检测、告警与保护逻辑。</title>
    <text class="node-title" x="1362" y="336" text-anchor="middle">保护装置</text>
  </g>

  <!-- ===== 规约转换器 ===== -->
  <g class="font">
    <rect class="node asset-blue" x="1162" y="548" width="250" height="72"/>
    <title>光伏发电单元规约转换器：负责现场协议与网络侧规约转换。</title>
    <text class="node-title" x="1287" y="578" text-anchor="middle">光伏发电单元</text>
    <text class="node-title" x="1287" y="604" text-anchor="middle">规约转换器</text>
  </g>

  <!-- ===== 光纤通信设备 ===== -->
  <g class="font">
    <text class="title" x="1516" y="294" text-anchor="middle">光纤通信</text>
    <text class="title" x="1516" y="322" text-anchor="middle">设备</text>

    <!-- 上部设备 -->
    <rect x="1496" y="350" width="30" height="130" rx="15" fill="#edf3f8" stroke="#50677c" stroke-width="1.8"/>
    <path d="M1511 362 V468" stroke="#8aa0b0" stroke-width="1.2" stroke-dasharray="4 4"/>

    <!-- 下部设备 -->
    <rect x="1496" y="560" width="30" height="130" rx="15" fill="#edf3f8" stroke="#50677c" stroke-width="1.8"/>
    <path d="M1511 572 V678" stroke="#8aa0b0" stroke-width="1.2" stroke-dasharray="4 4"/>

    <text class="small" x="1548" y="425">光纤</text>
    <path class="flow" d="M1526 426 H1586"/>

    <text class="small" x="1548" y="635">光纤</text>
    <path class="flow" d="M1526 636 H1586"/>
  </g>

  <!-- 网络文字 -->
  <g class="font">
    <text class="small" x="1450" y="588">网络</text>
    <path class="flow" d="M1412 584 H1496"/>
  </g>

  <!-- 图像监视 -->
  <g class="font">
    <rect class="node asset-slate" x="58" y="698" width="164" height="50"/>
    <title>图像监视：提供现场视频/图像监控信息。</title>
    <text class="node-title" x="140" y="730" text-anchor="middle">图像监视</text>
  </g>

  <!-- ===== 辅助通信 / 控制 / 监测路径 ===== -->
  <g>
    <!-- 上路通信链 -->
    <path class="signal" d="M164 272 V334 H475 V220"/>
    <path class="signal" d="M475 220 V334 H912 V218"/>
    <path class="signal" d="M912 218 V334 H1287 V548"/>

    <!-- 下路通信链 -->
    <path class="signal" d="M164 566 V640 H475 V514"/>
    <path class="signal" d="M475 514 V640 H912 V512"/>
    <path class="signal" d="M912 512 V640 H1287 V620"/>

    <!-- 测控与保护到光纤通信设备 -->
    <path class="signal" d="M1396 280 V350 H1496"/>
    <path class="signal" d="M1362 354 V480 H1496"/>

    <!-- 规约转换器到上部光纤通信设备 -->
    <path class="signal-arrow" d="M1412 584 H1496"/>

    <!-- 上下光通信设备逻辑连接 -->
    <path class="signal" d="M1511 480 V560"/>

    <!-- 图像监视接入下部光纤通信设备 -->
    <path class="signal" d="M222 723 H1511 V690"/>
  </g>
</svg>